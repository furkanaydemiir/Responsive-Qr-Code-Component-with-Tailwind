<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <link rel="stylesheet" href="index.css">
  <title>Frontend Mentor | QR code component</title>

</head>
<body class="bg-slate-300 w-full min-h-screen flex justify-center items-center">
  <main class="w-[320px] bg-white shadow-2xl rounded-2xl p-4 flex flex-col items-center">
    
    <img src="images/image-qr-code.png" class="w-full rounded-xl" alt="QR Code">
    
    <div class="text-center px-2 pb-6">
      <h1 class="text-slate-900 font-bold text-xl mt-6 leading-tight">
        Improve your front-end skills by building projects
      </h1>
      <p class="text-slate-500 text-[15px] mt-4 leading-normal">
        Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </div>

  </main>
</body>
  
</body>
</html>
