<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <link rel="stylesheet" href="index.css">
  <title>Frontend Mentor | QR code component</title>

</head>
<body class="bg-slate-300 w-full min-h-screen flex justify-center items-center " >
    <main class="w-[320px] h-[499px] bg-white shadow-lg">
     <div class="flex items-center flex-col">
       <img src="images/image-qr-code.png" class="w-[288px] h-[288px] mt-5 rounded shadow-lg cursor-pointer" alt="">
       <h1 class=" py-4 text-center text-preset-1 w-[270px] h-[52px]">Improve your front-end skills by building projects</h1>
       <p class="text-preset-2 text-center mt-8 w-[256px] h-[63px] ">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
     </div>
    </main>
  
</body>
</html>
